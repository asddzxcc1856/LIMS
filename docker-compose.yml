version: "3.9"

services:
  # ── MySQL ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: lab_booking
      MYSQL_USER: lab_user
      MYSQL_PASSWORD: lab_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # ── Django Backend API ───────────────────────────────────────
  backend:
    build: ./backend
    restart: always
    environment:
      DJANGO_SECRET_KEY: "change-me-in-production"
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      DB_ENGINE: mysql
      DB_NAME: lab_booking
      DB_USER: lab_user
      DB_PASSWORD: lab_pass
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1"
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  # ── Celery Worker ────────────────────────────────────────────
  celery:
    build: ./backend
    restart: always
    environment:
      DB_ENGINE: mysql
      DB_NAME: lab_booking
      DB_USER: lab_user
      DB_PASSWORD: lab_pass
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - mysql
      - redis
    command: celery -A backend worker -l info

  # ── Vue Frontend (Nginx) ────────────────────────────────────
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
